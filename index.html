<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FitConnect</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="app">

  <!-- LOGIN -->
  <section id="login" class="screen active center fade">
    <div class="login-box">
      <h1>FitConnect</h1>
      <p>Treine. Conecte. Evolua.</p>

      <input placeholder="Email">
      <input placeholder="Senha" type="password">

      <button class="btn-primary" onclick="entrar()">Entrar</button>
    </div>
  </section>

  <!-- APP -->
  <section id="mainApp" class="hidden fade">

    <main id="pages">

      <!-- HOME -->
      <div id="home" class="page active">

        <div class="card big">
          <h3>🏃 Run Club</h3>
          <p>Hoje • 19:00</p>
          <span>34 pessoas</span>
        </div>

        <div class="card">
          <h3>🚴 Pedal</h3>
          <p>Hoje • 20:00</p>
        </div>

      </div>

      <!-- MAP -->
      <div id="map" class="page">
        <div class="map">
          <div class="pin pulse" style="top:40%; left:50%"></div>
        </div>
      </div>

      <!-- CHAT -->
      <div id="chat" class="page">
        <div class="chat">

          <div class="bubble left">Bora treinar hoje?</div>
          <div class="bubble right">Bora 🔥</div>

        </div>

        <div class="chat-input">
          <input placeholder="Mensagem">
          <button>↑</button>
        </div>
      </div>

      <!-- PROFILE -->
      <div id="profile" class="page">
        <div class="profile">
          <div class="avatar">F</div>
          <h2>Fabrício</h2>

          <div class="stats">
            <div><b>120</b><span>KM</span></div>
            <div><b>32</b><span>Treinos</span></div>
            <div><b>8</b><span>Eventos</span></div>
          </div>
        </div>
      </div>

    </main>

    <!-- NAV -->
    <nav class="tabbar">
      <button onclick="go('home')">🏠</button>
      <button onclick="go('map')">📍</button>
      <button onclick="go('chat')">💬</button>
      <button onclick="go('profile')">👤</button>
    </nav>

  </section>

</div>

<script src="script.js"></script>
</body>
</html>
