<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FitConnect</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="app">

  <!-- LOGIN -->
  <section id="login" class="screen active center">
    <h1>FitConnect</h1>
    <p>Conecte-se ao seu treino</p>
    <input type="text" placeholder="Email">
    <input type="password" placeholder="Senha">
    <button onclick="entrar()">Entrar</button>
  </section>

  <!-- APP -->
  <section id="mainApp" class="hidden">

    <header>
      <h2 id="title">Início</h2>
    </header>

    <main>

      <!-- HOME -->
      <section id="home" class="tab active">
        <div class="card">
          <h3>🏃 Run Club</h3>
          <p>Hoje 19:00 • 23 pessoas</p>
          <button onclick="participar(this)">Participar</button>
        </div>
      </section>

      <!-- MAPA -->
      <section id="mapa" class="tab">
        <div class="map">
          <div class="pin" style="top:30%; left:40%">🏃</div>
          <div class="pin" style="top:60%; left:70%">🚴</div>
        </div>
      </section>

      <!-- CHAT -->
      <section id="chat" class="tab">
        <div class="chat-box" id="chatBox"></div>
        <div class="chat-input">
          <input id="msg" placeholder="Digite...">
          <button onclick="enviar()">Enviar</button>
        </div>
      </section>

      <!-- PERFIL -->
      <section id="perfil" class="tab">
        <h3>Fabrício</h3>
        <p>🏃 120 km</p>
        <p>🚴 80 km</p>
        <p>🔥 32 treinos</p>
      </section>

    </main>

    <!-- NAV -->
    <nav>
      <button onclick="trocar('home')">🏠</button>
      <button onclick="trocar('mapa')">📍</button>
      <button onclick="trocar('chat')">💬</button>
      <button onclick="trocar('perfil')">👤</button>
    </nav>

  </section>

</div>

<script src="script.js"></script>
</body>
</html>
